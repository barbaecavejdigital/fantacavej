    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --background-start-rgb: 241, 245, 249; /* slate-100 */
            --background-end-rgb: 248, 250, 252;   /* slate-50 */
            color-scheme: light;
        }

        html.dark {
            --background-start-rgb: 15, 23, 42;    /* slate-900 */
            --background-end-rgb: 30, 41, 59;     /* slate-800 */
            color-scheme: dark;
        }

        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: rgb(var(--background-end-rgb));
            background-image: radial-gradient(rgb(var(--background-start-rgb)) 1px, transparent 0);
            background-size: 20px 20px;
        }
        
        @keyframes modal-enter {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal-enter {
            animation: modal-enter 0.2s ease-out forwards;
        }

        @keyframes modal-exit {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }
        .animate-modal-exit {
            animation: modal-exit 0.15s ease-in forwards;
        }

        @keyframes toast-enter {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-toast-enter {
            animation: toast-enter 0.3s ease-out forwards;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="dark:bg-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
